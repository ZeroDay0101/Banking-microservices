spring.application.name=fraud-service
server.port=8083
logging.level.org.springframework.security=trace
server.servlet.context-path=/fraud
spring.mongodb.uri=mongodb://mongo:27017/account-service
spring.data.mongodb.auto-index-creation=true
banking.kafka.topics.fraud=${BANKING_TOPIC_FRAUD:account-fraud-transactions}
spring.kafka.consumer.properties.spring.json.trusted.packages=org.banking.commonlib.transaction,org.banking.commonlib.transaction.fraud
# Kafka Configuration
spring.kafka.bootstrap-servers=kafka:9092
# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# Consumer
spring.kafka.consumer.group-id=account-transactions-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
###
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://authorization-server:9000/auth/oauth2/jwks