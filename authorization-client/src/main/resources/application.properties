spring.application.name=authorization-client
# Client registration
spring.security.oauth2.client.registration.banking-client.client-id=banking-client
spring.security.oauth2.client.registration.banking-client.client-secret=secret
spring.security.oauth2.client.registration.banking-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.banking-client.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.banking-client.scope=openid,profile,accounts.read
spring.security.oauth2.client.registration.banking-client.provider=banking-client
# Provider configuration (Docker-friendly)
# --- Browser-Facing Endpoints (Localhost) ---
# The user's browser redirects here to perform the login
spring.security.oauth2.client.provider.banking-client.authorization-uri=http://localhost:9000/auth/oauth2/authorize
# --- Backend-Facing Endpoints (Internal Network) ---
# The client container uses these to verify signatures and swap the code for a token
spring.security.oauth2.client.provider.banking-client.token-uri=http://authorization-server:9000/auth/oauth2/token
spring.security.oauth2.client.provider.banking-client.jwk-set-uri=http://authorization-server:9000/auth/oauth2/jwks
# MongoDB
spring.mongodb.uri=mongodb://mongo:27017/account-service
spring.data.mongodb.auto-index-creation=true
# Logging
logging.level.org.springframework.security=trace